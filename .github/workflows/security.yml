name: Security Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  schedule:
    - cron: '23 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workflow-lint:
    name: Workflow Lint and Security
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          export GOPATH="$RUNNER_TEMP/go"
          echo "$GOPATH/bin" >> "$GITHUB_PATH"
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: actionlint
        run: actionlint -color

      - name: zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          inputs: .github/workflows
          persona: auditor
          min-severity: low
          version: 1.25.2
          advanced-security: false

  secret-scan:
    name: Gitleaks Secret Scan
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          export GOPATH="$RUNNER_TEMP/go"
          echo "$GOPATH/bin" >> "$GITHUB_PATH"
          go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Scan current tree
        run: gitleaks dir . --redact --no-banner --verbose

  trivy-fs:
    name: Trivy Filesystem Scan
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: SBOM/VEX policy reference
        if: ${{ failure() }}
        run: echo "Trivy filesystem scan failed. Review docs/security-sbom-vex.md before fixing or recording a VEX decision."
