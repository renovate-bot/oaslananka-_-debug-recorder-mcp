name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write # create release commits and GitHub Releases
      pull-requests: write # create and update release PRs
      issues: write # label release PR issues when needed by release-please
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-assets:
    name: Build Release Assets
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: release-please
    permissions:
      contents: write # attach release assets
      attestations: write # create artifact attestations
      id-token: write # sign artifact attestations
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release validation
        run: npm run ci:local

      - name: Build package assets
        shell: bash
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          npm pack --pack-destination release-assets
          npm sbom --sbom-format=cyclonedx > "release-assets/debug-recorder-mcp-${VERSION}.cdx.json"
          (cd release-assets && sha256sum ./* > SHA256SUMS)

      - name: Attest package tarball
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: release-assets/debug-recorder-mcp-*.tgz

      - name: Upload release assets to workflow
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: release-assets

      - name: Attach assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" release-assets/*

  npm-publish:
    name: Publish npm Package
    if: ${{ needs.release-please.outputs.release_created == 'true' && github.repository == 'oaslananka/debug-recorder-mcp' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs:
      - release-please
      - build-assets
    environment: npm-publish
    permissions:
      contents: read # read release artifacts
      id-token: write # npm trusted publishing
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
          registry-url: https://registry.npmjs.org

      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: release-assets

      - name: Confirm version is unpublished
        shell: bash
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          if npm view "debug-recorder-mcp@${VERSION}" version >/dev/null 2>&1; then
            echo "debug-recorder-mcp@${VERSION} already exists on npm"
            exit 1
          fi

      - name: Publish tarball with provenance
        shell: bash
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          tarball="./release-assets/debug-recorder-mcp-${VERSION}.tgz"
          test -f "$tarball"
          npm publish "$tarball" --access public --provenance

      - name: Verify npm publication
        shell: bash
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: test "$(npm view "debug-recorder-mcp@${VERSION}" version)" = "$VERSION"

  mcp-registry-readiness:
    name: MCP Registry Readiness
    if: ${{ needs.release-please.outputs.release_created == 'true' && github.repository == 'oaslananka/debug-recorder-mcp' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs:
      - release-please
      - npm-publish
    permissions:
      contents: read
      issues: write # create follow-up when npm succeeded but registry readiness failed
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify MCP Registry readiness after npm publication
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          test "$(npm view "debug-recorder-mcp@${VERSION}" version)" = "$VERSION"
          npm run check:version
          npm run check:mcp
          npm run check:mcp-registry:published

      - name: Upload registry descriptor
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcp-registry-descriptor
          path: server.json

      - name: Create registry follow-up issue
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release-please.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create             --title "[RELEASE] MCP Registry follow-up required for ${VERSION}"             --body "npm publication succeeded, but MCP Registry readiness failed. Review ${RUN_URL}, verify server.json, and complete or retry the registry submission manually."             --label "area:release,area:mcp,area:packaging,type:release,risk:medium,status:needs-triage"
