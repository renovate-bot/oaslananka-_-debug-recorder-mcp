name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Quality / Node ${{ matrix.node-version }}
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.22.3', '24.16.0']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Dead-code check
        run: npm run check:dead-code

      - name: Coverage tests
        run: npm run test:coverage
        env:
          JEST_JUNIT_OUTPUT_DIR: >-
            test-results/node-${{ matrix.node-version }}/coverage

      - name: Fuzz regression tests
        run: npm run test:fuzz
        env:
          JEST_JUNIT_OUTPUT_DIR: >-
            test-results/node-${{ matrix.node-version }}/fuzz

      - name: Build
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e
        env:
          JEST_JUNIT_OUTPUT_DIR: >-
            test-results/node-${{ matrix.node-version }}/e2e

      - name: Dependency audit
        shell: bash
        run: |
          set -euo pipefail
          npm audit --audit-level=moderate || {
            echo "::error::Dependency audit failed. Review docs/security-sbom-vex.md before fixing or recording a VEX decision."
            exit 1
          }

      - name: Package dry run
        run: npm pack --dry-run

      - name: Package size check
        run: npm run check:package-size

      - name: Version sync
        run: node scripts/check-version-sync.mjs

      - name: MCP metadata
        run: node scripts/validate-mcp-metadata.mjs

      - name: Upload quality artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quality-node-${{ matrix.node-version }}
          path: |
            coverage
            test-results
          if-no-files-found: ignore

  docker:
    name: Docker Build, Smoke, and Scan
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t debug-recorder-mcp:ci .

      - name: HTTP smoke test
        shell: bash
        run: |
          set -euo pipefail
          cid="$(docker run -d --rm \
            -p 127.0.0.1:3000:3000 \
            -e HOST=0.0.0.0 \
            -e PORT=3000 \
            -e DEBUG_RECORDER_REMOTE_HTTP=true \
            -e DEBUG_RECORDER_HTTP_TOKEN=ci-local-token \
            -e DEBUG_RECORDER_ALLOWED_HOSTS=127.0.0.1:3000,localhost:3000 \
            -e DEBUG_RECORDER_ALLOWED_ORIGINS=http://127.0.0.1:3000,http://localhost:3000 \
            debug-recorder-mcp:ci)"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$cid"
          exit 1

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: debug-recorder-mcp:ci
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: SBOM/VEX policy reference
        if: ${{ failure() }}
        run: echo "Trivy container scan failed. Review docs/security-sbom-vex.md before fixing or recording a VEX decision."
