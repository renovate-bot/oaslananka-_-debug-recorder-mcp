name: Initial npm Token Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish. Must match package.json.
        required: true
        type: string
      dist-tag:
        description: npm dist-tag
        required: true
        default: latest
        type: string

permissions:
  contents: read

concurrency:
  group: npm-initial-publish-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish first npm package with NPM_TOKEN
    if: ${{ github.repository == 'oaslananka/debug-recorder-mcp' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: npm-publish
    permissions:
      contents: read # checkout release source
      id-token: write # sign npm provenance during first token-based publish
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Validate token and version
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          test -n "${NODE_AUTH_TOKEN:-}" || {
            echo "::error::NPM_TOKEN secret is required for the first token-based publish."
            exit 1
          }
          actual="$(node -p "require('./package.json').version")"
          test "$actual" = "$INPUT_VERSION" || {
            echo "::error::Input version $INPUT_VERSION does not match package.json version $actual."
            exit 1
          }

      - name: Install dependencies
        run: npm ci

      - name: Full release validation
        run: npm run ci:local

      - name: Pack package
        run: npm pack --pack-destination release-assets

      - name: Publish with token and provenance
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
          DIST_TAG: ${{ inputs.dist-tag }}
        run: |
          set -euo pipefail
          tarball="release-assets/debug-recorder-mcp-${INPUT_VERSION}.tgz"
          test -f "$tarball"
          npm publish "$tarball" --access public --tag "$DIST_TAG" --provenance

      - name: Verify npm publication
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: test "$(npm view "debug-recorder-mcp@${INPUT_VERSION}" version)" = "$INPUT_VERSION"
